spring:
    security:
        oauth2:
            client:
                registration:
                    keycloak:
                        client-id: bff-client
                        client-secret: {{KEYCLOAK_CLIENT_SECRET}}
                        authorization-grant-type: authorization_code
                        scope: openid, profile, email
                provider:
                    keycloak:
                        issuer-uri: http://localhost:8085/realms/telcocrm-gygy5
    cloud:
        gateway:
            server:
                webmvc:
                    routes:
                        - id: gateway-server
                          uri: lb://gateway-server
                          predicates:
                            - Path=/api/**
                          filters:
                            - TokenRelay
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        fetch-registry: true
        register-with-eureka: true
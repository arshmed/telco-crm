server:
  port: 9002

spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5402/customer
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:test12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:localhost}:8085/realms/telcocrm-gygy5
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:8085/realms/telcocrm-gygy5/protocol/openid-connect/certs

  cloud:
    stream:
      bindings:
        customerRegisteredEvent-out-0:
          destination: customer-registered-topic
          content-type: application/json
        customerKYCApprovedEvent-out-0:
          destination: customer-kyc-approved-topic
          content-type: application/json
        customerUpdatedEvent-out-0:
          destination: customer-updated-topic
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}

eureka:
  client:
    service-url:
      defaultZone: http://${DISCOVERY_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: ${HOSTNAME:localhost}

springdoc:
  api-docs:
    path: /api/v1/customers/api-docs
  swagger-ui:
    path: /api/v1/customers/swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

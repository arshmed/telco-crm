server:
  port: 8222

spring:
  application:
    name: gateway-server

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:localhost}:8085/realms/telcocrm-gygy5
          jwk-set-uri: http://${KEYCLOAK_HOST:localhost}:8085/realms/telcocrm-gygy5/protocol/openid-connect/certs

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers/**

            - id: product-catalog-service
              uri: lb://product-catalog-service
              predicates:
                - Path=/api/v1/tariffs/**,/api/v1/addons/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**

            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/v1/subscriptions/**

            - id: usage-service
              uri: lb://usage-service
              predicates:
                - Path=/api/v1/usage/**

            - id: billing-service
              uri: lb://billing-service
              predicates:
                - Path=/api/v1/invoices/**,/api/v1/billing/**

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**

            - id: ticket-service
              uri: lb://ticket-service
              predicates:
                - Path=/api/v1/tickets/**

eureka:
  client:
    service-url:
      defaultZone: http://${DISCOVERY_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

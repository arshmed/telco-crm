spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8085/realms/telcocrm-gygy5
    datasource:
        url: jdbc:postgresql://localhost:5404/orders
        username: postgres
        password: test12345
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
    cloud:
        function:
            definition: paymentCompletedEvent;paymentFailedEvent;subscriptionActivatedEvent
        stream:
            bindings:
                paymentCompletedEvent-in-0:
                    destination: payment-completed-topic
                    content-type: application/json
                paymentFailedEvent-in-0:
                    destination: payment-failed-topic
                    content-type: application/json
                subscriptionActivatedEvent-in-0:
                    destination: subscription-activated-topic
                    content-type: application/json
            kafka:
                binder:
                    brokers: localhost:9092
resilience4j:
  circuitbreaker:
    instances:
      customerServiceCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      productCatalogServiceCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8085/realms/telcocrm-gygy5
    datasource:
        url: jdbc:postgresql://localhost:5404/orders
        username: postgres
        password: test12345
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
    cloud:
        function:
            definition: paymentCompletedEvent;paymentFailedEvent;subscriptionActivatedEvent
        stream:
            bindings:
                paymentCompletedEvent-in-0:
                    destination: payment-completed-topic
                    content-type: application/json
                paymentFailedEvent-in-0:
                    destination: payment-failed-topic
                    content-type: application/json
                subscriptionActivatedEvent-in-0:
                    destination: subscription-activated-topic
                    content-type: application/json
            kafka:
                binder:
                    brokers: localhost:9092

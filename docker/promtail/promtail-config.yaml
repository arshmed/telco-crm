server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: order-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: order-service
          service_name: order-service
          __path__: /var/log/telco-crm/order-service/*.log
    pipeline_stages:
      - json:
          expressions:
            ts: '"@timestamp"'
      - timestamp:
          source: ts
          format: RFC3339Nano

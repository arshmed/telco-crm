spring:
  application:
    name: order-service
  profiles:
    active: dev
  config:
    import: "configserver:http://localhost:8888"
  
  cloud:
    stream:
      bindings:
        orderCreatedEvent-out-0:
          destination: order-created-topic
          content-type: application/json
        orderConfirmedEvent-out-0:
          destination: order-confirmed-topic
          content-type: application/json
        orderCancelledEvent-out-0:
          destination: order-cancelled-topic
          content-type: application/json
        paymentCompletedEvent-in-0:
          destination: payment-completed-topic
          content-type: application/json
        paymentFailedEvent-in-0:
          destination: payment-failed-topic
          content-type: application/json
        subscriptionActivatedEvent-in-0:
          destination: subscription-activated-topic
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092
